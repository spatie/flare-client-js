name: TypeScript

on:
    push:

jobs:
    typescript:
        name: TypeScript
        runs-on: 'ubuntu-latest'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.node-version'

            - name: Install dependencies
              run: npm install

            - name: Build packages
              run: npm run build

            - name: Run TypeScript
              run: npm run typescript

            - name: Typecheck e2e harness
              run: npm run typecheck:e2e
