<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flare JS Playground</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 600px;
                margin: 40px auto;
                padding: 0 20px;
            }
            button {
                display: block;
                width: 100%;
                padding: 12px;
                margin: 8px 0;
                font-size: 16px;
                cursor: pointer;
                border: 1px solid #ccc;
                border-radius: 6px;
                background: #f5f5f5;
            }
            button:hover {
                background: #e0e0e0;
            }
            #status {
                margin-top: 20px;
                padding: 12px;
                border-radius: 6px;
                display: none;
            }
            .success {
                background: #d4edda;
                color: #155724;
            }
            .error {
                background: #f8d7da;
                color: #721c24;
            }
        </style>
    </head>
    <body>
        <h1>Flare JS Playground</h1>
        <p>Test error reporting for the <code>@flareapp/js</code> client.</p>

        <button id="test-connection">Test Connection</button>
        <button id="unhandled-error">Trigger Unhandled Error</button>
        <button id="manual-report">Manual Error Report</button>
        <button id="async-error">Async Error</button>
        <button id="custom-context">Error with Custom Context</button>
        <button id="report-message">Report Message (non-error)</button>

        <div id="status"></div>

        <script type="module" src="/main.js"></script>
    </body>
</html>
